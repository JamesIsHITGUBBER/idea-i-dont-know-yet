<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driving Sandbox</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>

    <div class="hud">
      <div class="hud-card">
        <div class="label">Driving Sandbox</div>
        <h1>Polytrack Test Course</h1>
        <p>Use WASD or arrow keys to drive. Hold space to drift and lay down skid marks. Press P to start the run. Cross the finish gate to stop the timer. Press R to reset.</p>
        <p id="statusValue">Press P to start the run.</p>
      </div>
      <div class="stats">
        <div class="stat">Timer <strong id="timerValue">00:00.000</strong></div>
        <div class="stat">Speed <strong id="speedValue">0 mph</strong></div>
        <div class="stat">Heading <strong id="headingValue">0</strong></div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
